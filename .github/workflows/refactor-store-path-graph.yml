name: Refactor StorePathGraph

on:
  pull_request:
    types: [synchronize]
    branches:
      - main

concurrency:
  group: refactor-store-path-graph
  cancel-in-progress: true

jobs:
  cancel-stale-refactor:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Refactor runner unavailable; cancel stale queued runs."
