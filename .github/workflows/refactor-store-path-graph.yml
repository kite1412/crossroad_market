name: Refactor StorePathGraph

on:
  push:
    branches:
      - agent/block-store-entry-isolate-location-ui-refactor-graph

permissions:
  contents: write

jobs:
  split-store-path-graph:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/block-store-entry-isolate-location-ui-refactor-graph
          fetch-depth: 0

      - name: Generate inherited graph parts
        run: python3 tools/refactor_store_path_graph.py

      - name: Validate generated source
        run: |
          git diff --check
          python3 - <<'PY'
          from pathlib import Path
          oversized = []
          for path in Path('scripts').rglob('*.gd'):
              lines = len(path.read_text(encoding='utf-8').splitlines())
              if lines >= 1000:
                  oversized.append((str(path), lines))
          if oversized:
              raise SystemExit(f'GDScript files still at or above 1,000 lines: {oversized}')
          print('All GDScript source files are below 1,000 lines.')
          PY

      - name: Commit generated refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/locations/store/StorePathGraph.gd scripts/locations/store/store_path_graph_parts
          git rm .github/workflows/refactor-store-path-graph.yml tools/refactor_store_path_graph.py
          git commit -m "Split StorePathGraph into inherited modules"
          git push origin HEAD:agent/block-store-entry-isolate-location-ui-refactor-graph
