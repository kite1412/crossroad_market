name: Godot 4.7 Compile Repair

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/**"
      - "tools/ci/apply_godot_47_compile_fixes.py"
      - "tools/ci/apply_godot_47_compile_fixes_v2.py"
      - ".github/workflows/store-navigation-parse.yml"
      - ".github/workflows/apply-godot-47-compile-fixes.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-and-compile:
    if: github.head_ref == 'agent/fix-godot-47-navigation-compile-errors'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-godot-47-navigation-compile-errors
          fetch-depth: 0

      - name: Apply deterministic source fixes
        run: python tools/ci/apply_godot_47_compile_fixes_v2.py

      - name: Install Godot 4.7 stable
        shell: bash
        run: |
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.7-stable_linux.x86_64

      - name: Compile every GDScript resource
        shell: bash
        run: |
          cat > /tmp/check_all_scripts.gd <<'GDSCRIPT'
          extends SceneTree

          var failures: int = 0

          func _init() -> void:
              _scan_directory("res://")
              if failures > 0:
                  push_error("Failed to compile %d GDScript resource(s)." % failures)
              quit(1 if failures > 0 else 0)

          func _scan_directory(path: String) -> void:
              var directory: DirAccess = DirAccess.open(path)
              if directory == null:
                  push_error("Cannot open %s" % path)
                  failures += 1
                  return
              directory.list_dir_begin()
              var entry: String = directory.get_next()
              while entry != "":
                  if entry == ".godot" or entry == ".git":
                      entry = directory.get_next()
                      continue
                  var full_path: String = path.path_join(entry)
                  if directory.current_is_dir():
                      _scan_directory(full_path)
                  elif entry.ends_with(".gd"):
                      var script: Resource = ResourceLoader.load(
                          full_path,
                          "Script",
                          ResourceLoader.CACHE_MODE_IGNORE
                      )
                      if script == null:
                          failures += 1
                  entry = directory.get_next()
              directory.list_dir_end()
          GDSCRIPT
          timeout 180s /tmp/godot/Godot_v4.7-stable_linux.x86_64 \
            --headless --path . --script /tmp/check_all_scripts.gd

      - name: Commit verified source repairs
        shell: bash
        run: |
          git restore .github/workflows/store-navigation-parse.yml
          git restore .github/workflows/apply-godot-47-compile-fixes.yml
          rm -f tools/ci/apply_godot_47_compile_fixes.py
          rm -f tools/ci/apply_godot_47_compile_fixes_v2.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts tools/ci
          git commit -m "Fix Godot 4.7 navigation compile errors"
          git push origin HEAD:agent/fix-godot-47-navigation-compile-errors
